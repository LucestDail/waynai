# ===========================================================
# WaynAI Backend - application.properties
# ===========================================================
# 민감정보(API Key 등)는 전부 환경변수로 주입합니다.
# 로컬 개발은 프로젝트 루트의 .env 를 사용해주세요.
#   (start-backend-dev.sh 가 자동으로 .env 를 로드합니다)
# 운영 서버는 /etc/systemd/... 또는 /var/www/key/... 에서 가져옵니다.
# -----------------------------------------------------------

# ---- Server ----
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/

# ---- Application Info ----
spring.application.name=waynai-backend
info.app.name=WaynAI Backend Service
info.app.version=1.1.0
info.app.description=LLM \uae30\ubc18 \uad00\uad11 \ucf54\uc2a4 \uc0dd\uc131 \uc11c\ube44\uc2a4

# ---- Logging ----
logging.level.com.waynai.demo=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ---- Actuator ----
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ---- Jackson ----
spring.jackson.default-property-inclusion=NON_NULL
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Seoul

# ---- CORS (\ucf54\ub4dc\uc5d0\uc11c WebConfig \ub85c \uc81c\uc5b4) ----
waynai.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# ===========================================================
# \u2728 Gemini LLM \uc124\uc815
# ===========================================================
# gemini.api.key : \ud0a4\ub294 \ud558\ub098\uc758 \uacf3(\ud658\uacbd\ubcc0\uc218)\uc5d0\uc11c\ub9cc \uad00\ub9ac.
# gemini.model.chain : \uc800\uac00 \ubaa8\ub378 \u2192 \uace0\uac00 \ubaa8\ub378 \uc21c. \uc2e4\ud328(429/5xx/quota) \uc2dc \ub2e4\uc74c \ubaa8\ub378\ub85c \ud56b\uc2a4\uc651.
gemini.api.key=${GEMINI_API_KEY:}
gemini.model.chain=${GEMINI_MODEL_CHAIN:gemini-3.1-flash-lite-preview,gemini-3-flash-preview,gemini-3.1-pro-preview}
gemini.request.timeout-ms=${GEMINI_TIMEOUT_MS:45000}
gemini.retry.per-model=${GEMINI_RETRY_PER_MODEL:1}
gemini.request.timeout-seconds=${GEMINI_TIMEOUT_SECONDS:60}
# 로컬 개발 전용. JVM cacerts 에 Google 루트 CA 가 없을 때만 true. 운영에서는 반드시 false.
gemini.tls.insecure=${GEMINI_TLS_INSECURE:false}

# ===========================================================
# \uac80\uc0c9 / \uad00\uad11 API
# ===========================================================
naver.api.client.id=${NAVER_CLIENT_ID:}
naver.api.client.secret=${NAVER_CLIENT_SECRET:}
naver.api.url=https://openapi.naver.com/v1/search/blog

# \ud55c\uad6d\uad00\uad11\uacf5\uc0ac \uacf5\uacf5\ub370\uc774\ud130 \uc11c\ube44\uc2a4\ud0a4 (3\uac1c \uc5d4\ub4dc\ud3ec\uc778\ud2b8 \uacf5\uc6a9)
tour.api.service-key=${TOUR_API_SERVICE_KEY:}

data.api.url.LocgoHubTarService1.areaBasedList1=https://apis.data.go.kr/B551011/LocgoHubTarService1/areaBasedList1
data.api.url.LocgoHubTarService1.areaBasedList1.serviceKey=${tour.api.service-key}

data.api.url.TarRlteTarService1.areaBasedList1=https://apis.data.go.kr/B551011/TarRlteTarService1/areaBasedList1
data.api.url.TarRlteTarService1.areaBasedList1.serviceKey=${tour.api.service-key}

data.api.url.TarRlteTarService1.searchKeyword1=https://apis.data.go.kr/B551011/TarRlteTarService1/searchKeyword1
data.api.url.TarRlteTarService1.searchKeyword1.serviceKey=${tour.api.service-key}

# 좌표기반(모바일 GPS) 주변 관광지 — KorService2.locationBasedList2 (신버전)
data.api.url.KorService2.locationBasedList2=https://apis.data.go.kr/B551011/KorService2/locationBasedList2
data.api.url.KorService2.locationBasedList2.serviceKey=${tour.api.service-key}

# 좌표기반 구버전 폴백 — KorService1.locationBasedList1 (서비스키 공용)
data.api.url.KorService1.locationBasedList1=https://apis.data.go.kr/B551011/KorService1/locationBasedList1
data.api.url.KorService1.locationBasedList1.serviceKey=${tour.api.service-key}
